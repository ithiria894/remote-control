<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f3" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>remote-control</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="brand">
            <div class="brand-mark">RC</div>
            <div>
              <div class="brand-title">remote-control</div>
              <div class="brand-subtitle">Research preview</div>
            </div>
          </div>
          <div class="sidebar-head-actions">
            <button id="refreshButton" type="button" class="sidebar-icon" aria-label="Refresh sessions">Refresh</button>
            <button id="sidebarCloseButton" type="button" class="sidebar-icon mobile-sidebar-close" aria-label="Close sessions">Close</button>
          </div>
        </div>

        <button id="newButton" type="button" class="sidebar-primary">New chat</button>

        <div class="sidebar-section">
          <div class="section-label">Sessions</div>
          <div id="sessionGroups" class="session-groups"></div>
        </div>

        <div class="sidebar-section sidebar-section-secondary">
          <div class="sidebar-section-head">
            <div class="section-label">Active Local Terminals</div>
            <button id="syncActiveButton" type="button" class="sidebar-icon sidebar-icon-small" aria-label="Sync active local terminals">Sync</button>
          </div>
          <div id="nativeThreadList" class="session-groups"></div>
        </div>
      </aside>
      <button id="sidebarBackdrop" type="button" class="sidebar-backdrop" aria-label="Close sessions"></button>

      <main class="main">
        <header class="topbar">
          <button id="sidebarToggleButton" type="button" class="sidebar-icon mobile-sidebar-toggle" aria-label="Open recent sessions" aria-expanded="false">Recents</button>
          <div class="topbar-copy">
            <div class="session-eyebrow">Remote control</div>
            <div id="sessionTitle" class="session-title">New session</div>
            <div id="threadMeta" class="thread-meta">No active thread</div>
          </div>
        </header>

        <section id="transcript" class="transcript"></section>

        <div class="status-rail">
          <div id="connectionStatus" class="status-chip">Connecting…</div>
          <div id="sessionState" class="status-chip subtle">idle</div>
          <div id="cwdSummary" class="cwd-summary">workspace</div>
          <button id="stopButton" type="button" class="danger" aria-label="Stop active turn">Stop</button>
        </div>

        <form id="composer" class="composer">
          <div class="composer-head">
            <div class="composer-copy">
              <div class="composer-label">Ask Codex</div>
              <div id="composerHint" class="composer-hint">Write the next prompt, revision, or question here.</div>
            </div>
            <div id="composerHelp" class="composer-shortcut">Enter to send, Shift+Enter for a newline</div>
          </div>
          <textarea
            id="promptInput"
            aria-label="Message input"
            aria-describedby="composerHint composerHelp"
            placeholder="Type a prompt, revision, or question..."
            rows="3"
            spellcheck="false"
          ></textarea>
          <div id="composerSettings" class="composer-settings" hidden>
            <input id="cwdInput" class="control cwd-input" placeholder="/path/to/project" spellcheck="false" autocapitalize="off" autocorrect="off" />
            <button id="applyCwdButton" type="button" class="ghost">Apply workspace</button>
          </div>
          <div class="composer-footer">
            <div class="composer-actions">
              <div id="providerPills" class="provider-pills" role="group" aria-label="Provider">
                <button type="button" class="provider-pill active" data-provider="codex" aria-pressed="true">Codex</button>
                <button type="button" class="provider-pill" data-provider="gemini" aria-pressed="false">Gemini</button>
              </div>
              <select id="providerSelect" class="control slim provider-select-native" aria-label="Provider" tabindex="-1" aria-hidden="true">
                <option value="codex">Codex</option>
                <option value="gemini">Gemini</option>
              </select>
              <button id="composerSettingsButton" type="button" class="ghost composer-settings-toggle" aria-expanded="false">Workspace</button>
              <button id="submitButton" type="submit">Send</button>
            </div>
          </div>
          <div id="eventFeed" class="event-strip"></div>
        </form>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
